name: Data extraction

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    environment: Bot Actions

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas PyGithub

      - name: Extract World Circle data
        env:
          TOKEN: ${{ secrets.CLASSIC_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: python circles.py
      
      - name: Extract Winnable Issue progress
        env:
          PROJECT_MANAGEMENT_REPOSITORY_NAME: ${{vars.PROJECT_MANAGEMENT_REPOSITORY_NAME}}
          TOKEN: ${{ secrets.CLASSIC_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: python winnable_issues.py